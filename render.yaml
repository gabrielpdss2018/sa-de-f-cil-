databases:
  - name: saude-facil-db
    databaseName: saude_facil
    user: saude_user
    plan: free

services:
  # 1. Backend (API Node.js)
  - type: web
    name: saude-facil-backend
    env: node
    plan: free
    rootDir: saude-facil-backend
    buildCommand: npm install && npm run build
    startCommand: npx prisma migrate deploy && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: saude-facil-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production

  # 2. Frontend (React/Vite)
  - type: web
    name: saude-facil-frontend
    env: static
    plan: free
    rootDir: saude-facil-front-end
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        fromStack:
          type: web
          name: saude-facil-backend
          property: url
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
